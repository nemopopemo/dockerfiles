networks:
  eventschedule:
    driver: bridge

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        APP_REF: main
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: eventschedule
      DB_USERNAME: eventschedule
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      APP_URL: ${APP_URL:-http://localhost}
      APP_ENV: production
      APP_DEBUG: "false"
      FORCE_HTTPS: "true"
      SESSION_SECURE_COOKIE: "true"
      LOG_CHANNEL: stack
      LOG_LEVEL: info
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command: ["php-fpm", "-F"]
    restart: unless-stopped
    networks:
      - eventschedule
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 5s
      timeout: 3s
      retries: 30

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    depends_on:
      app:
        condition: service_healthy
    expose:
      - "80"
    volumes:
      - storage:/var/www/html/storage:ro
    restart: unless-stopped
    networks:
      - eventschedule

  db:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: eventschedule
      MYSQL_USER: eventschedule
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 3s
      retries: 40
    restart: unless-stopped
    networks:
      eventschedule:
        aliases:
          - db

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        APP_REF: main
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: eventschedule
      DB_USERNAME: eventschedule
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      APP_ENV: production
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    command: ["sh", "-lc", "while :; do php artisan schedule:run --verbose --no-interaction || true; sleep 60; done"]
    restart: unless-stopped
    networks:
      - eventschedule
    volumes:
      - storage:/var/www/html/storage
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules

volumes:
  dbdata:
  storage:
  vendor:
  node_modules:

